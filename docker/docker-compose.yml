services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: qihang
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qihang"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env
    environment:
      ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/qihang
      JWT_SECRET: local-development-only-jwt-secret-20260307
      JWT_EXPIRE_MINUTES: 60
      JWT_REFRESH_EXPIRE_DAYS: 14
      REDIS_URL: redis://redis:6379/0
      REDIS_NAMESPACE: qihang
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PRIVATE_BUCKET: qihang-private
      S3_DEMO_BUCKET: qihang-demo
      S3_REGION: us-east-1
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      CSRF_TTL_SECONDS: 3600
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver,api
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-auto@mingrun-tech.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-auto@mingrun-tech.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-铭润科技}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DEMO_MODE: "true"
      DEMO_INFER_ENABLED: "false"
      UPLOAD_MAX_MB: 50
      UPLOAD_PUT_PROXY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - ../.env
    environment:
      ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/qihang
      JWT_SECRET: local-development-only-jwt-secret-20260307
      REDIS_URL: redis://redis:6379/0
      REDIS_NAMESPACE: qihang
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PRIVATE_BUCKET: qihang-private
      S3_DEMO_BUCKET: qihang-demo
      S3_REGION: us-east-1
      DEMO_MODE: "true"
      DEMO_INFER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      INTERNAL_API_BASE_URL: http://api:8000
      QIHANG_LOCAL_STACK: "true"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_ASSET_ORIGIN: http://localhost:9000
      NEXT_PUBLIC_APP_NAME: QIHANG
      NEXT_PUBLIC_DEMO_MAX_IMAGE_MB: 10
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do
        echo 'waiting for minio...' && sleep 2;
      done;
      /usr/bin/mc mb -p local/qihang-private || true;
      /usr/bin/mc mb -p local/qihang-demo || true;
      /usr/bin/mc ilm rule add --expire-days 1 local/qihang-demo || true;
      exit 0;
      "

volumes:
  pg_data:
  minio_data:
